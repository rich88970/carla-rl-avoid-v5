name: offline-tests

# 不需 CARLA server。注意:carla_rl/wrappers 在 import 時會載入 EasyCarla-RL → carla wheel,
# 故「執行」單元測試需要 CARLA 相依,無法在乾淨 runner 直接跑(見 INSTALL.md,本地執行)。
# 此 CI 驗證:(1) 整個套件可在乾淨 Ubuntu + Python 3.10 byte-compile;
#            (2) 不依賴 CARLA 的 RL 核心(configs / models / agents)可正常 import。

on:
  push:
  pull_request:

jobs:
  compile-and-core-import:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install CARLA-free dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy==1.24.4 torch==2.5.1 gym==0.26.2

      - name: Byte-compile whole package
        run: python -m compileall carla_rl

      - name: Import CARLA-free RL core
        run: |
          python -c "import carla_rl.configs.reward_config"
          python -c "import carla_rl.models.nets"
          python -c "import carla_rl.agents.sac"
